<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>MIDI → Strudel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
      import { Midi } from "https://cdn.skypack.dev/@tonejs/midi@2.0.27";
      window.Midi = Midi; // expose globally so our old-school script can use it
    </script>
    <style>
      code {
        font-family: "Fira Code", monospace;
      }
    </style>
  </head>

  <body
    class="min-h-screen flex items-center justify-center bg-gradient-to-tr from-slate-900 to-slate-800 text-gray-100"
  >
    <main class="w-full max-w-4xl p-2 space-y-7">
      <h1 class="text-2xl font-bold">MIDI → Strudel v1.1</h1>

      <section class="space-y-2 text-sm">
        <p>Drop a MIDI file anywhere in the window</p>
        <input
          id="file"
          type="file"
          accept=".mid,.midi"
          class="block w-full file:mr-4 file:px-6 file:py-2 file:rounded-full file:border-0 file:text-base file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-700"
        />
      </section>

      <section class="space-y-2 text-sm">
        <h2 class="text-base font-semibold opacity-80">Options</h2>

        <label class="flex items-center gap-2" title="The amount of bars to convert. 0 means no limit.">
          <span>Bar limit</span>
          <input
            id="barLimit"
            type="number"
            min="0"
            value="0"
            class="w-20 px-2 py-1 rounded bg-gray-800"
          />
        </label>

        <label class="flex items-center gap-2" title="The resolution. Usually in steps of 4 (4, 8, 16...). Higher gives better note placement but can get big.">
          <span>Notes per bar</span>
          <input
            id="notesPerBar"
            type="number"
            min="1"
            value="64"
            class="w-20 px-2 py-1 rounded bg-gray-800"
          />
        </label>

        <label class="flex items-center gap-2" title="How many spaces to use for indentation in the output.">
          <span>Tab size</span>
          <input
            id="tabSize"
            type="number"
            min="1"
            max="8"
            value="2"
            class="w-16 px-2 py-1 rounded bg-gray-800"
          />
        </label>

        <label class="flex items-center gap-2">
          <input id="guessInstrument" type="checkbox" checked />
          <span>Use the sounds closest to the instruments mentioned in the MIDI</span>
        </label>

        <label class="flex items-center gap-2">
          <input id="flatSequences" type="checkbox" />
          <span>No complex timing or chords</span>
        </label>

        <label class="flex items-center gap-2" title="Makes it harder to make changes, but takes up less space for a drop & forget.">
          <input id="smallPrint" type="checkbox" />
          <span>Put all notes on a single line</span>
        </label>

        <button
          id="convertBtn"
          type="button"
          class="text-base px-6 py-2 bg-indigo-600 hover:bg-indigo-700 rounded-full font-semibold"
        >
          Convert
        </button>
      </section>

      <section class="space-y-2">
        <h2 class="text-base font-semibold opacity-80">Result</h2>

        <textarea
          id="output"
          readonly
          class="w-full h-64 px-3 py-2 rounded bg-gray-700 font-mono text-sm"
        ></textarea>

        <p class="text-xs opacity-70">
          Visit the
          <a
            href="https://github.com/Emanuel-de-Jong/MIDI-To-Strudel"
            target="_blank"
            class="underline hover:text-indigo-400"
          >
            git repository
          </a>
          for a Python version and the source code.
        </p>

        <button
          id="openBtn"
          class="hidden px-6 py-2 bg-indigo-600 hover:bg-indigo-700 rounded-full font-semibold"
        >
          Open in Strudel
        </button>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
